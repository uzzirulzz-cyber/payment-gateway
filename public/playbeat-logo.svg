<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <defs>
    <linearGradient id="pb-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="pb-grad-text" x1="56" y1="12" x2="220" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Logo mark: rounded square with soundwave -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#pb-grad)"/>
  <g stroke="#ffffff" stroke-width="2.6" stroke-linecap="round">
    <line x1="14" y1="20" x2="14" y2="28"/>
    <line x1="20" y1="14" x2="20" y2="34"/>
    <line x1="26" y1="18" x2="26" y2="30"/>
    <line x1="32" y1="22" x2="32" y2="26"/>
  </g>
  <!-- Wordmark -->
  <text x="56" y="32" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="url(#pb-grad-text)" letter-spacing="-0.5">Playbeat</text>
  <text x="180" y="32" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="currentColor" letter-spacing="-0.3">Digital</text>
</svg>
